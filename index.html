<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT26 Maintenance Planner - A-B-A-C Cycle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { background-color: #0f172a; font-family: 'Chakra Petch', sans-serif; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 1.25rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; text-align: center; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); outline: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">GT26 INSPECTION CYCLE</h1>
                <p class="text-slate-400">การคำนวณตามรอบมาตรฐาน A → B → A → C (ทุกๆ 9,000 EOH)</p>
            </div>
        </header>

        <div class="glass-card p-8 mb-8 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">วันที่บันทึกข้อมูล</label>
                    <input type="date" id="baseDate" class="input-field w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Current EOH (Hrs)</label>
                    <input type="number" id="currentEOH" placeholder="0.00" class="input-field w-full p-3 rounded-xl text-xl font-bold">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Avg. EOH / Day</label>
                    <input type="number" id="avgEOHPerDay" value="24" class="input-field w-full p-3 rounded-xl">
                </div>
                <div class="flex items-end">
                    <button onclick="calculatePlan()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                        <i class="fas fa-sync-alt mr-2"></i> ประมวลผลรอบซ่อม
                    </button>
                </div>
            </div>
        </div>

        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card p-5 border-l-4 border-emerald-500 relative overflow-hidden group">
                <div class="absolute right-[-10px] top-[-10px] text-emerald-500/10 text-6xl font-bold italic">A1</div>
                <h3 class="text-emerald-400 font-bold text-sm">TYPE A (1st)</h3>
                <p class="text-[10px] text-slate-500 mb-3 tracking-widest uppercase">Target: 9,000 EOH</p>
                <div id="typeA1_days" class="text-2xl font-bold text-white mb-1">-- วัน</div>
                <div id="typeA1_date" class="text-[12px] text-slate-300 bg-slate-800/50 p-1.5 rounded-lg inline-block">-</div>
            </div>

            <div class="glass-card p-5 border-l-4 border-amber-500 relative overflow-hidden group">
                <div class="absolute right-[-10px] top-[-10px] text-amber-500/10 text-6xl font-bold italic">B</div>
                <h3 class="text-amber-400 font-bold text-sm">TYPE B</h3>
                <p class="text-[10px] text-slate-500 mb-3 tracking-widest uppercase">Target: 18,000 EOH</p>
                <div id="typeB_days" class="text-2xl font-bold text-white mb-1">-- วัน</div>
                <div id="typeB_date" class="text-[12px] text-slate-300 bg-slate-800/50 p-1.5 rounded-lg inline-block">-</div>
            </div>

            <div class="glass-card p-5 border-l-4 border-emerald-500 relative overflow-hidden group">
                <div class="absolute right-[-10px] top-[-10px] text-emerald-500/10 text-6xl font-bold italic">A2</div>
                <h3 class="text-emerald-400 font-bold text-sm">TYPE A (2nd)</h3>
                <p class="text-[10px] text-slate-500 mb-3 tracking-widest uppercase">Target: 27,000 EOH</p>
                <div id="typeA2_days" class="text-2xl font-bold text-white mb-1">-- วัน</div>
                <div id="typeA2_date" class="text-[12px] text-slate-300 bg-slate-800/50 p-1.5 rounded-lg inline-block">-</div>
            </div>

            <div class="glass-card p-5 border-l-4 border-red-500 relative overflow-hidden group">
                <div class="absolute right-[-10px] top-[-10px] text-red-500/10 text-6xl font-bold italic">C</div>
                <h3 class="text-red-400 font-bold text-sm">TYPE C (MAJOR)</h3>
                <p class="text-[10px] text-slate-500 mb-3 tracking-widest uppercase">Target: 36,000 EOH</p>
                <div id="typeC_days" class="text-2xl font-bold text-white mb-1">-- วัน</div>
                <div id="typeC_date" class="text-[12px] text-slate-300 bg-slate-800/50 p-1.5 rounded-lg inline-block">-</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('baseDate').valueAsDate = new Date();

        function calculatePlan() {
            const baseDateVal = document.getElementById('baseDate').value;
            const currentEOH = parseFloat(document.getElementById('currentEOH').value);
            const avgRate = parseFloat(document.getElementById('avgEOHPerDay').value);

            if (!baseDateVal || isNaN(currentEOH) || isNaN(avgRate) || avgRate <= 0) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return;
            }

            const baseDate = new Date(baseDateVal);
            const targets = [
                { id: 'typeA1', limit: 9000 },
                { id: 'typeB', limit: 18000 },
                { id: 'typeA2', limit: 27000 },
                { id: 'typeC', limit: 36000 }
            ];

            targets.forEach(target => {
                const remainingEOH = target.limit - currentEOH;
                const daysLeft = Math.ceil(remainingEOH / avgRate);
                const targetDate = new Date(baseDate);
                targetDate.setDate(baseDate.getDate() + daysLeft);
                
                const dayEl = document.getElementById(`${target.id}_days`);
                const dateEl = document.getElementById(`${target.id}_date`);

                if (remainingEOH > 0) {
                    dayEl.innerText = `${daysLeft.toLocaleString()} วัน`;
                    dayEl.classList.remove('text-red-400');
                    dateEl.innerText = targetDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
                } else {
                    dayEl.innerText = "DONE / OVERDUE";
                    dayEl.classList.add('text-red-400');
                    dateEl.innerText = "ผ่านมาเมื่อ: " + targetDate.toLocaleDateString('th-TH');
                }
            });
        }
    </script>
</body>
</html>
